  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;

    }
    .badge {
      background: #f59e0b;
      color: #0f172a;
      font-weight: 700;
      padding: 0.25rem 0.75rem;

      font-size: 0.8rem;

      margin-bottom: 1rem;
    }

    p { color: #94a3b8; font-size: 0.95rem; line-height: 1.6; }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid #334155;
      border-top-color: #f59e0b;

      margin: 1.5rem auto;
    }

<body>

  <script>
    // Allow pixel event to fire (250ms), then redirect
    setTimeout(function() {
      // Detect region — default India, fallback US
      var dest = 'https://amzn.in/d/07mpECwD';
      try {
        var tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
        if (tz && !tz.includes('Asia')) {
          dest = 'https://a.co/d/04f16dWE';
        }
      } catch(e) {}
      window.location.href = dest;
    }, 300);
  </script>
