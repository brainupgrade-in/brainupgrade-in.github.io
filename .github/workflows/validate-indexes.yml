name: validate-indexes

# Runs on every push to main. Regenerates posts-data.json, sitemap.xml,
# and rss.xml from the post HTML files (the source of truth) and fails if
# the committed copies drift from the regenerated ones.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  drift-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Regenerate indexes + SEO/AEO lint (warn-level)
        # Lint emits ::warning:: annotations for over-length <title>, over-
        # length meta description, missing BlogPosting/FAQPage JSON-LD, and
        # missing related-reading block. Drift below is still a hard fail.
        # Flip to --strict once the backlog from the 2026-04-17 review is
        # burnt down.
        run: python3 docs/scripts/regenerate_indexes.py

      - name: Fail if posts-data.json / sitemap.xml / rss.xml drifted
        run: |
          if ! git diff --exit-code docs/blog/posts-data.json docs/sitemap.xml docs/blog/rss.xml; then
            echo ""
            echo "::error::Indexes are out of sync with docs/blog/posts/*.html."
            echo "::error::Run docs/scripts/regenerate_indexes.py locally, commit the result, and push again."
            echo "::error::(docs/scripts/publish.sh does this automatically — prefer that.)"
            exit 1
          fi
          echo "Indexes match disk ✓"
