name: validate-no-fabrication

# Runs on every push/PR to main. Fails if any blog post under
# docs/blog/posts/ carries a high-confidence fabricated-client-attribution
# signature (issue/gotcha #88): named enterprises as clients/trainees,
# invented studies, the FinTrust persona, or the Fortune-500 lead-magnet
# boilerplate. Mirrors validate-template.yml. See
# docs/scripts/validate-no-fabrication.py for the (conservative) signatures.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  no-fabrication:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate no fabricated client attribution (#88)
        run: python3 docs/scripts/validate-no-fabrication.py
